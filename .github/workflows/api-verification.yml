name: API Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  api-verification:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: uberfoods
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Setup PowerShell for cross-platform testing
      shell: pwsh
      run: |
        Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"
        Write-Host "curl version:"
        curl --version

    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: Generate Prisma client
      working-directory: ./backend
      run: npx prisma generate --schema=./prisma/schema.prisma

    - name: Run database migrations
      working-directory: ./backend
      run: npx prisma db push --schema=./prisma/schema.prisma
      env:
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods

    - name: Create test driver
      working-directory: ./backend
      run: node scripts/create-test-driver.js
      env:
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods

    - name: Start E2E backend
      working-directory: ./backend
      run: |
        npm run start:e2e &
        # Wait for backend to be ready (scripts handle their own health checks)
        sleep 20

    - name: Run final verification
      working-directory: ./backend
      shell: pwsh
      run: |
        & pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File ./scripts/final-verification.ps1
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Final verification failed"
          exit 1
        }

    - name: Run smoke driver test
      working-directory: ./backend
      shell: pwsh
      run: |
        & pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File ./scripts/smoke-driver.ps1
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Smoke driver test failed"
          exit 1
        }

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: api-verification-results
        path: |
          backend/scripts/
        retention-days: 30
