name: E2E Release Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  gate-a-hard:
    name: "Gate A: Hard Gate (Desktop Chromium + Firefox)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: hmor_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Setup database
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/hmor_test
        run: |
          npx prisma migrate deploy --schema=./prisma/schema.prisma
          npx prisma db seed || true

      - name: Install frontend dependencies
        working-directory: ./frontend/admin-panel
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend/admin-panel
        run: npx playwright install --with-deps

      - name: Run Gate A (Hard)
        working-directory: ./frontend/admin-panel
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/hmor_test
          JWT_SECRET: test-secret-key
          NODE_ENV: e2e
          PAYMENT_WEBHOOK_TEST_MODE: "true"
          PAYPAL_WEBHOOK_TEST_MODE: "true"
        run: npm run e2e:gate:a

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gate-a-artifacts
          path: |
            frontend/admin-panel/test-results/
            frontend/admin-panel/playwright-report/
          retention-days: 7

  gate-b-soft-mobile-smoke:
    name: "Gate B: Soft Gate (Mobile Chrome Smoke)"
    runs-on: ubuntu-latest
    continue-on-error: true

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: hmor_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Setup database
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/hmor_test
        run: |
          npx prisma migrate deploy --schema=./prisma/schema.prisma
          npx prisma db seed || true

      - name: Install frontend dependencies
        working-directory: ./frontend/admin-panel
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend/admin-panel
        run: npx playwright install --with-deps

      - name: Run Gate B (Soft Smoke)
        working-directory: ./frontend/admin-panel
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/hmor_test
          JWT_SECRET: test-secret-key
          NODE_ENV: e2e
          PAYMENT_WEBHOOK_TEST_MODE: "true"
          PAYPAL_WEBHOOK_TEST_MODE: "true"
        run: npm run e2e:gate:b

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gate-b-artifacts
          path: |
            frontend/admin-panel/test-results/
            frontend/admin-panel/playwright-report/
          retention-days: 7
