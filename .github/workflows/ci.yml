name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend API Verification
  api-verification:
    runs-on: ubuntu-latest
    env:
      ADMIN_TEST_EMAIL: ci-admin@example.test
      ADMIN_TEST_PASSWORD: ci-admin-password-placeholder
      CUSTOMER_TEST_EMAIL: ci-customer@example.test
      CUSTOMER_TEST_PASSWORD: ci-customer-password-placeholder
      DRIVER_TEST_EMAIL: ci-driver@example.test
      DRIVER_TEST_PASSWORD: ci-driver-password-placeholder
      RESTAURANT_TEST_EMAIL: ci-restaurant@example.test
      RESTAURANT_TEST_PASSWORD: ci-restaurant-password-placeholder
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: uberfoods
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: Generate Prisma client
      working-directory: ./backend
      run: npx prisma generate --schema=./prisma/schema.prisma

    - name: Run database migrations
      working-directory: ./backend
      run: npx prisma migrate deploy --schema=./prisma/schema.prisma
      env:
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods

    - name: Create test driver
      working-directory: ./backend
      run: node scripts/create-test-driver.js
      env:
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods

    - name: Create test admin
      working-directory: ./backend
      run: node scripts/create-test-admin.js
      env:
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods

    - name: Create test restaurant and dish
      working-directory: ./backend
      run: node scripts/create-test-restaurant.js
      env:
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods
        RESTAURANT_TEST_NAME: CI Test Restaurant
        RESTAURANT_TEST_EMAIL: ci-restaurant@example.test
        RESTAURANT_TEST_PASSWORD: ci-restaurant-password-placeholder
        RESTAURANT_TEST_ADDRESS: CI Test Street 1
        DISH_TEST_NAME: CI Test Dish
        DISH_TEST_PRICE: 1290

    - name: Start E2E backend
      working-directory: ./backend
      run: |
        npm run start:e2e &
        # Wait for backend to be ready (scripts handle their own health checks)
        sleep 20
      env:
        CI: true
        NODE_ENV: test
        PORT: 3000
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: ci-jwt-secret-placeholder
        JWT_EXPIRES_IN: 1h
        STRIPE_SECRET_KEY: STRIPE_SECRET_KEY_PLACEHOLDER
        STRIPE_WEBHOOK_SECRET: STRIPE_WEBHOOK_SECRET_PLACEHOLDER
        PAYPAL_CLIENT_ID: PAYPAL_CLIENT_ID_PLACEHOLDER
        PAYPAL_CLIENT_SECRET: PAYPAL_CLIENT_SECRET_PLACEHOLDER
        ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004

    - name: Run API verification scripts
      working-directory: ./backend
      shell: pwsh
      run: |
        # Run final verification
        & pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File ./scripts/final-verification.ps1
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Final verification failed"
          exit 1
        }

        # Run smoke driver test
        & pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File ./scripts/smoke-driver.ps1
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Smoke driver test failed"
          exit 1
        }

        # Run SocialMedia service unit tests
        npm test -- --testPathPattern=social-media.service.spec.ts --runInBand
        if ($LASTEXITCODE -ne 0) {
          Write-Error "SocialMedia service tests failed"
          exit 1
        }

  # UI-E2E Full Order Lifecycle Test
  ui-e2e-lifecycle:
    runs-on: ubuntu-latest
    needs: api-verification
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: uberfoods
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright
      run: npx playwright install --with-deps

    - name: Setup backend for E2E
      working-directory: ./backend
      run: |
        npm ci
        npx prisma generate --schema=./prisma/schema.prisma
        npx prisma migrate deploy --schema=./prisma/schema.prisma
        node scripts/create-test-driver.js
        npm run start:e2e &
        sleep 20
        curl -f http://localhost:3000/api/health || (echo "Backend failed to start" && exit 1)
      env:
        CI: true
        NODE_ENV: test
        PORT: 3000
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: ci-jwt-secret-placeholder
        JWT_EXPIRES_IN: 1h
        STRIPE_SECRET_KEY: STRIPE_SECRET_KEY_PLACEHOLDER
        STRIPE_WEBHOOK_SECRET: STRIPE_WEBHOOK_SECRET_PLACEHOLDER
        PAYPAL_CLIENT_ID: PAYPAL_CLIENT_ID_PLACEHOLDER
        PAYPAL_CLIENT_SECRET: PAYPAL_CLIENT_SECRET_PLACEHOLDER
        ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004

    - name: Install frontend dependencies
      run: |
        npm ci --prefix frontend/customer-web
        npm ci --prefix frontend/admin-panel
        npm ci --prefix frontend/restaurant-web
        npm ci --prefix frontend/driver-app

    - name: Start all frontend apps
      run: |
        mkdir -p frontend/logs
        # Start all frontend apps from the repo root so relative paths stay stable
        PORT=3001 npm run dev --prefix frontend/customer-web -- --host 0.0.0.0 --port 3001 > frontend/logs/customer-web.log 2>&1 &
        npm run dev:localhost --prefix frontend/admin-panel > frontend/logs/admin-panel.log 2>&1 &
        npm run dev --prefix frontend/restaurant-web > frontend/logs/restaurant-web.log 2>&1 &
        npm run dev --prefix frontend/driver-app > frontend/logs/driver-app.log 2>&1 &
        sleep 15
        cat frontend/logs/customer-web.log || true
        ps aux | grep -E "vite|node" || true
        ls -la frontend/logs || true

        # Verify all apps are running
        curl -v http://localhost:3001 || (echo "Customer web failed" && exit 1)
        curl -f http://localhost:3002 || (echo "Admin panel failed" && exit 1)
        curl -f http://localhost:3003 || (echo "Restaurant web failed" && exit 1)
        curl -f http://localhost:3004 || (echo "Driver app failed" && exit 1)

    - name: Setup Authentication States
      working-directory: ./frontend/customer-web
      run: npm run test:setup-auth

    - name: Run Full Order Lifecycle UI-E2E Test
      working-directory: ./frontend/customer-web
      run: RUN_ID=${{ github.run_id }}_${{ github.run_attempt }} npx playwright test full-order-lifecycle.spec.ts --reporter=line,html,junit
      env:
        RUN_ID: ${{ github.run_id }}_${{ github.run_attempt }}

    - name: Upload UI-E2E test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ui-e2e-lifecycle-results
        path: |
          frontend/customer-web/playwright-report/
          frontend/customer-web/test-results/
          frontend/logs/
        retention-days: 30

  # Individual Frontend E2E Tests
  frontend-e2e:
    runs-on: ubuntu-latest
    needs: api-verification
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: uberfoods
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright
      run: npx playwright install --with-deps

    - name: Setup backend for E2E
      working-directory: ./backend
      run: |
        npm ci
        npx prisma generate --schema=./prisma/schema.prisma
        npx prisma migrate deploy --schema=./prisma/schema.prisma
        npm run start:e2e &
        sleep 15
        curl -f http://localhost:3000/api/health || (echo "Backend failed to start" && exit 1)
      env:
        CI: true
        NODE_ENV: test
        PORT: 3000
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: ci-jwt-secret-placeholder
        JWT_EXPIRES_IN: 1h
        STRIPE_SECRET_KEY: STRIPE_SECRET_KEY_PLACEHOLDER
        STRIPE_WEBHOOK_SECRET: STRIPE_WEBHOOK_SECRET_PLACEHOLDER
        PAYPAL_CLIENT_ID: PAYPAL_CLIENT_ID_PLACEHOLDER
        PAYPAL_CLIENT_SECRET: PAYPAL_CLIENT_SECRET_PLACEHOLDER
        ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004

    - name: Run customer web E2E tests
      working-directory: ./frontend/customer-web
      run: |
        npm ci
        npm run build
        npm run preview &
        sleep 10
        npx playwright test --grep-invert "full-order-lifecycle"

    - name: Run admin panel unit tests
      working-directory: ./frontend/admin-panel
      run: |
        npm ci
        npm test -- --testPathPattern=SocialManagement.test.tsx --watchAll=false
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Admin panel SocialManagement tests failed"
          exit 1
        }

    - name: Run admin panel E2E tests
      working-directory: ./frontend/admin-panel
      run: |
        npm ci
        npm run build
        npm run preview &
        sleep 10
        npx playwright test

    - name: Run driver app E2E tests
      working-directory: ./frontend/driver-app
      run: |
        npm ci
        npm run build
        npm run preview &
        sleep 10
        npx playwright test

    - name: Upload individual E2E test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-results
        path: |
          frontend/*/playwright-report/
          frontend/*/test-results/
        retention-days: 30

  # Build and deploy checks
  build:
    runs-on: ubuntu-latest
    needs: [api-verification, ui-e2e-lifecycle, frontend-e2e]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build backend
      working-directory: ./backend
      run: |
        npm ci
        npm run build

    - name: Build customer web
      working-directory: ./frontend/customer-web
      run: |
        npm ci
        npm run build

    - name: Build admin panel
      working-directory: ./frontend/admin-panel
      run: |
        npm ci
        npm run build

    - name: Build driver app
      working-directory: ./frontend/driver-app
      run: |
        npm ci
        npm run build

    - name: Build restaurant web
      working-directory: ./frontend/restaurant-web
      run: |
        npm ci
        npm run build
