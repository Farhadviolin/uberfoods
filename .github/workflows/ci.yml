name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master, main, develop, release/uberfoods-rc1-production-readiness ]
  pull_request:
    branches: [ master, main, develop, release/uberfoods-rc1-production-readiness ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend API Verification
  api-verification:
    runs-on: ubuntu-latest
    env:
      ADMIN_TEST_EMAIL: ci-admin@example.test
      ADMIN_TEST_PASSWORD: ci-admin-password-placeholder
      CUSTOMER_TEST_EMAIL: ci-customer@example.test
      CUSTOMER_TEST_PASSWORD: ci-customer-password-placeholder
      DRIVER_TEST_EMAIL: ci-driver@example.test
      DRIVER_TEST_PASSWORD: ci-driver-password-placeholder
      RESTAURANT_TEST_EMAIL: ci-restaurant@example.test
      RESTAURANT_TEST_PASSWORD: ci-restaurant-password-placeholder
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: uberfoods
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: Generate Prisma client
      working-directory: ./backend
      run: npx prisma generate --schema=./prisma/schema.prisma

    - name: Run database migrations
      working-directory: ./backend
      run: npx prisma migrate deploy --schema=./prisma/schema.prisma
      env:
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods

    - name: Create test driver
      working-directory: ./backend
      run: node scripts/create-test-driver.js
      env:
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods

    - name: Create test admin
      working-directory: ./backend
      run: node scripts/create-test-admin.js
      env:
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods

    - name: Create test restaurant and dish
      working-directory: ./backend
      run: node scripts/create-test-restaurant.js
      env:
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods
        RESTAURANT_TEST_NAME: CI Test Restaurant
        RESTAURANT_TEST_EMAIL: ci-restaurant@example.test
        RESTAURANT_TEST_PASSWORD: ci-restaurant-password-placeholder
        RESTAURANT_TEST_ADDRESS: CI Test Street 1
        DISH_TEST_NAME: CI Test Dish
        DISH_TEST_PRICE: 1290

    - name: Start E2E backend
      working-directory: ./backend
      run: |
        npm run start:e2e &
        # Wait for backend to be ready (scripts handle their own health checks)
        sleep 20
      env:
        CI: true
        NODE_ENV: test
        PORT: 3000
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: ci-jwt-secret-placeholder
        JWT_EXPIRES_IN: 1h
        STRIPE_SECRET_KEY: STRIPE_SECRET_KEY_PLACEHOLDER
        STRIPE_WEBHOOK_SECRET: STRIPE_WEBHOOK_SECRET_PLACEHOLDER
        PAYPAL_CLIENT_ID: PAYPAL_CLIENT_ID_PLACEHOLDER
        PAYPAL_CLIENT_SECRET: PAYPAL_CLIENT_SECRET_PLACEHOLDER
        ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004

    - name: Run API verification scripts
      working-directory: ./backend
      shell: pwsh
      run: |
        # Run final verification
        & pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File ./scripts/final-verification.ps1
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Final verification failed"
          exit 1
        }

        # Run smoke driver test
        & pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File ./scripts/smoke-driver.ps1
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Smoke driver test failed"
          exit 1
        }

        # Run SocialMedia service unit tests
        npm test -- --testPathPattern=social-media.service.spec.ts --runInBand
        if ($LASTEXITCODE -ne 0) {
          Write-Error "SocialMedia service tests failed"
          exit 1
        }

  ui-e2e-lifecycle:
    runs-on: ubuntu-latest
    needs:
      - api-verification
      - playwright-browsers
    timeout-minutes: 35
    env:
      DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
      PLAYWRIGHT_SKIP_BROWSER_GC: "1"
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: uberfoods
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Restore Playwright browsers cache
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/customer-web/package-lock.json', 'frontend/customer-web/package.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Verify Playwright Chromium installation
      timeout-minutes: 2
      run: |
        set -euo pipefail

        PW_CACHE_DIR="${PLAYWRIGHT_BROWSERS_PATH:-$HOME/.cache/ms-playwright}"
        PW_CACHE_DIR="${PW_CACHE_DIR/#\~/$HOME}"

        echo "PLAYWRIGHT_BROWSERS_PATH=${PLAYWRIGHT_BROWSERS_PATH:-}"
        echo "Resolved Playwright cache dir: $PW_CACHE_DIR"

        if [ ! -d "$PW_CACHE_DIR" ]; then
          echo "Playwright cache directory does not exist yet: $PW_CACHE_DIR"
          mkdir -p "$PW_CACHE_DIR"
        fi

        npm --prefix frontend/customer-web exec -- playwright --version

        echo "Cache directory listing:"
        find "$PW_CACHE_DIR" -maxdepth 4 -type f | head -n 100 || true

        chromium_path="$(
          find "$PW_CACHE_DIR" -type f \( \
            -path "*/chrome-linux*/chrome" -o \
            -path "*/chrome-linux*/headless_shell" -o \
            -path "*/chromium_headless_shell-*/chrome-linux/headless_shell" -o \
            -path "*/chromium_headless_shell-*/chrome-headless-shell-linux64/chrome-headless-shell" \
          \) | head -n 1
        )"

        if [ -z "$chromium_path" ]; then
          echo "No Chromium executable found in $PW_CACHE_DIR"
          echo "Available Playwright cache content:"
          find "$PW_CACHE_DIR" -maxdepth 5 -print || true
          exit 1
        fi

        echo "Chromium executable: $chromium_path"
        chmod +x "$chromium_path" || true
        "$chromium_path" --version || "$chromium_path" --help >/dev/null

        echo "Playwright Chromium installation verification succeeded"

    - name: Setup backend for E2E
      working-directory: ./backend
      run: |
        npm ci
        npx prisma generate --schema=./prisma/schema.prisma
        npx prisma migrate deploy --schema=./prisma/schema.prisma
        npm run prisma:seed
        node scripts/create-test-driver.js
        npm run start:e2e &
        sleep 20
        curl -f http://localhost:3000/api/health || (echo "Backend failed to start" && exit 1)
      env:
        CI: true
        NODE_ENV: test
        PORT: 3000
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods
        REDIS_URL: redis://localhost:6379
        SEED_CUSTOMER_PASSWORD: test123
        SEED_RESTAURANT_PASSWORD: restaurant123
        SEED_DRIVER_PASSWORD: driver123
        JWT_SECRET: ci-jwt-secret-placeholder
        JWT_EXPIRES_IN: 1h
        STRIPE_SECRET_KEY: STRIPE_SECRET_KEY_PLACEHOLDER
        STRIPE_WEBHOOK_SECRET: STRIPE_WEBHOOK_SECRET_PLACEHOLDER
        PAYPAL_CLIENT_ID: PAYPAL_CLIENT_ID_PLACEHOLDER
        PAYPAL_CLIENT_SECRET: PAYPAL_CLIENT_SECRET_PLACEHOLDER
        ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004

    - name: Install frontend dependencies
      run: |
        npm ci --prefix frontend/customer-web
        npm ci --prefix frontend/admin-panel
        npm ci --prefix frontend/restaurant-web
        npm ci --prefix frontend/driver-app

    - name: Start all frontend apps
      run: |
        mkdir -p frontend/logs
        wait_for_url() {
          local name="$1"
          local url="$2"
          local log_file="$3"
          local pid="$4"

          echo "Waiting for $name at $url"
          for i in {1..60}; do
            if curl -fsS "$url" >/dev/null 2>&1; then
              echo "$name is ready at $url"
              return 0
            fi

            if ! kill -0 "$pid" >/dev/null 2>&1; then
              echo "$name process exited before becoming ready"
              echo "===== $name log ====="
              cat "$log_file" || true
              return 1
            fi

            echo "waiting for $name at $url..."
            sleep 2
          done

          echo "$name did not become ready at $url"
          echo "===== $name log ====="
          cat "$log_file" || true
          return 1
        }

        npm run dev:e2e --prefix frontend/customer-web > frontend/logs/customer-web.log 2>&1 &
        echo $! > frontend/logs/customer-web.pid

        echo "Checking port 3002 before starting admin-panel"
        (lsof -i :3002 || true)
        (ss -ltnp | grep ':3002' || true)

        npm run dev:fixed --prefix frontend/admin-panel > frontend/logs/admin-panel.log 2>&1 &
        echo $! > frontend/logs/admin-panel.pid

        npm run dev --prefix frontend/restaurant-web -- --host 0.0.0.0 --port 3003 > frontend/logs/restaurant-web.log 2>&1 &
        echo $! > frontend/logs/restaurant-web.pid

        npm run dev --prefix frontend/driver-app -- --host 0.0.0.0 --port 3004 > frontend/logs/driver-app.log 2>&1 &
        echo $! > frontend/logs/driver-app.pid

        wait_for_url "customer-web" "http://127.0.0.1:3102" "frontend/logs/customer-web.log" "$(cat frontend/logs/customer-web.pid)"
        wait_for_url "admin-panel" "http://127.0.0.1:3002" "frontend/logs/admin-panel.log" "$(cat frontend/logs/admin-panel.pid)"
        wait_for_url "restaurant-web" "http://127.0.0.1:3003" "frontend/logs/restaurant-web.log" "$(cat frontend/logs/restaurant-web.pid)"
        wait_for_url "driver-app" "http://127.0.0.1:3004" "frontend/logs/driver-app.log" "$(cat frontend/logs/driver-app.pid)"

    - name: Verify frontend readiness before auth setup
      shell: bash
      run: |
        set -euo pipefail

        echo "Verifying customer-web readiness before auth setup..."
        for i in {1..30}; do
          if curl -fsS http://127.0.0.1:3102/ >/dev/null 2>&1 && curl -fsS http://127.0.0.1:3102/login >/dev/null 2>&1; then
            echo "customer-web is reachable for auth setup"
            exit 0
          fi
          echo "customer-web not ready yet for auth setup attempt $i/30"
          sleep 2
        done

        echo "customer-web did not become reachable before auth setup"
        echo "===== HTTP checks ====="
        for url in http://127.0.0.1:3102/ http://127.0.0.1:3102/login; do
          echo "--- $url ---"
          curl -fsS -D - "$url" -o /dev/null || true
        done
        echo "===== processes ====="
        ps aux | grep -E "vite|node|npm" || true
        echo "===== ports ====="
        (ss -ltnp | grep -E ':3102|:3002|:3003|:3004' || true)
        echo "===== customer-web log ====="
        cat frontend/logs/customer-web.log || true
        echo "===== admin-panel log ====="
        cat frontend/logs/admin-panel.log || true
        echo "===== restaurant-web log ====="
        cat frontend/logs/restaurant-web.log || true
        echo "===== driver-app log ====="
        cat frontend/logs/driver-app.log || true
        exit 1

    - name: Setup Authentication States
      working-directory: ./frontend/customer-web
      env:
        RELEASE_GATE_MANAGED: true
        CUSTOMER_URL: http://127.0.0.1:3102
        E2E_AUTH_ROLES: customer,admin,restaurant,driver
      shell: bash
      run: |
        set -euo pipefail

        echo "Auth setup diagnostics"
        pwd
        echo "RELEASE_GATE_MANAGED=${RELEASE_GATE_MANAGED:-unset}"
        echo "CUSTOMER_URL=${CUSTOMER_URL:-unset}"
        echo "E2E_AUTH_ROLES=${E2E_AUTH_ROLES:-unset}"
        node --version
        npm --version
        npm --prefix . exec -- playwright --version || true
        ls -la playwright || true
        ls -la playwright/.auth || true

        set +e
        npm run test:setup-auth 2>&1 | tee ../logs/setup-auth.log
        AUTH_EXIT=${PIPESTATUS[0]}
        set -e

        if [ "$AUTH_EXIT" -ne 0 ]; then
          echo "Auth setup failed with exit code $AUTH_EXIT"
          echo "===== setup-auth.log ====="
          cat ../logs/setup-auth.log || true
          echo "===== playwright auth dir ====="
          ls -la playwright/.auth || true
          echo "===== ports ====="
          (ss -ltnp | grep -E ':3102|:3002|:3003|:3004' || true)
          echo "===== processes ====="
          ps aux | grep -E "vite|node|npm" || true
          echo "===== customer-web log ====="
          cat ../logs/customer-web.log || true
          echo "===== admin-panel log ====="
          cat ../logs/admin-panel.log || true
          echo "===== restaurant-web log ====="
          cat ../logs/restaurant-web.log || true
          echo "===== driver-app log ====="
          cat ../logs/driver-app.log || true
          exit "$AUTH_EXIT"
        fi

    - name: Run Full Order Lifecycle UI-E2E Test
      working-directory: ./frontend/customer-web
      run: RUN_ID=${{ github.run_id }}_${{ github.run_attempt }} npx playwright test full-order-lifecycle.spec.ts --project=full-lifecycle --grep "Complete Order Lifecycle" --reporter=line,html,junit --workers=1 --retries=0 --timeout=900000 --global-timeout=1500000
      env:
        RUN_ID: ${{ github.run_id }}_${{ github.run_attempt }}
        RELEASE_GATE_MANAGED: true
        CUSTOMER_URL: http://127.0.0.1:3102

    - name: Upload UI-E2E test results
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: ui-e2e-lifecycle-results
        path: |
          frontend/customer-web/playwright-report/
          frontend/customer-web/test-results/
          frontend/logs/
        retention-days: 30

  playwright-browsers:
    runs-on: ubuntu-latest
    needs: api-verification
    timeout-minutes: 50
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      PLAYWRIGHT_SKIP_BROWSER_GC: "1"
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Restore Playwright browsers cache
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/customer-web/package-lock.json', 'frontend/customer-web/package.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      working-directory: ./frontend/customer-web
      timeout-minutes: 40
      run: |
        npm ci

        ./node_modules/.bin/playwright --version

        expected_chromium_path="$(
          node -e "const { chromium } = require('playwright'); process.stdout.write(chromium.executablePath())"
        )"

        echo "Expected Chromium executable: $expected_chromium_path"

        if [ ! -x "$expected_chromium_path" ]; then
          ./node_modules/.bin/playwright install --only-shell chromium
        fi

        chromium_path="$expected_chromium_path"

        if [ ! -x "$chromium_path" ]; then
          chromium_path="$(
            find "$HOME/.cache/ms-playwright" -type f \( \
              -path "*/chrome-linux*/chrome" -o \
              -path "*/chrome-linux*/headless_shell" -o \
              -path "*/chromium_headless_shell-*/chrome-linux/headless_shell" -o \
              -path "*/chromium_headless_shell-*/chrome-headless-shell-linux64/chrome-headless-shell" \
            \) | head -n 1
          )"
        fi

        if [ ! -x "$chromium_path" ]; then
          echo "Expected Chromium executable is still missing or not executable: $expected_chromium_path"
          find "$HOME/.cache/ms-playwright" -maxdepth 6 -type f | sort | head -300 || true
          exit 1
        fi

        "$chromium_path" --version
        echo "Playwright Chromium installation succeeded"
        ls -la ~/.cache/ms-playwright || true

    - name: Verify Playwright browsers
      working-directory: ./frontend/customer-web
      timeout-minutes: 2
      run: |
        set -euo pipefail

        npm ci

        ./node_modules/.bin/playwright --version

        expected_chromium_path="$(
          node -e "const { chromium } = require('playwright'); process.stdout.write(chromium.executablePath())"
        )"

        echo "Expected Chromium executable: $expected_chromium_path"

        echo "Playwright browser cache:"
        find "$HOME/.cache/ms-playwright" -maxdepth 4 -type f | sort | head -200 || true

        if [ ! -x "$expected_chromium_path" ]; then
          echo "Expected Chromium executable is missing or not executable: $expected_chromium_path"
          ./node_modules/.bin/playwright install --only-shell chromium
        fi

        chromium_path="$expected_chromium_path"

        if [ ! -x "$chromium_path" ]; then
          chromium_path="$(
            find "$HOME/.cache/ms-playwright" -type f \( -path "*/chrome-linux*/chrome" -o -path "*/chrome-linux*/headless_shell" \) | head -n 1
          )"
        fi

        if [ ! -x "$chromium_path" ]; then
          echo "Expected Chromium executable is still missing or not executable: $expected_chromium_path"
          find "$HOME/.cache/ms-playwright" -maxdepth 6 -type f | sort | head -300 || true
          exit 1
        fi

        "$chromium_path" --version

        echo "Playwright Chromium cache verification succeeded"

    - name: Save Playwright browsers cache
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/customer-web/package-lock.json') }}

  # Individual Frontend E2E Tests
  frontend-e2e:
    runs-on: ubuntu-latest
    needs: api-verification
    env:
      DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: uberfoods
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: false

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Install Playwright
      run: npx playwright install chromium

    - name: Setup backend for E2E
      working-directory: ./backend
      run: |
        npm ci
        npx prisma generate --schema=./prisma/schema.prisma
        npx prisma migrate deploy --schema=./prisma/schema.prisma
        npm run prisma:seed
        npm run start:e2e &
        sleep 15
        curl -f http://localhost:3000/api/health || (echo "Backend failed to start" && exit 1)
      env:
        CI: true
        NODE_ENV: test
        PORT: 3000
        DATABASE_URL: postgresql://postgres:postgres123@localhost:5434/uberfoods
        REDIS_URL: redis://localhost:6379
        SEED_CUSTOMER_PASSWORD: test123
        SEED_RESTAURANT_PASSWORD: restaurant123
        SEED_DRIVER_PASSWORD: driver123
        JWT_SECRET: ci-jwt-secret-placeholder
        JWT_EXPIRES_IN: 1h
        STRIPE_SECRET_KEY: STRIPE_SECRET_KEY_PLACEHOLDER
        STRIPE_WEBHOOK_SECRET: STRIPE_WEBHOOK_SECRET_PLACEHOLDER
        PAYPAL_CLIENT_ID: PAYPAL_CLIENT_ID_PLACEHOLDER
        PAYPAL_CLIENT_SECRET: PAYPAL_CLIENT_SECRET_PLACEHOLDER
        ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004

    - name: Run customer web E2E tests
      working-directory: ./frontend/customer-web
      env:
        RELEASE_GATE_MANAGED: true
        CUSTOMER_URL: http://127.0.0.1:3102
        E2E_AUTH_ROLES: customer
      run: |
        npm ci
        npx playwright install chromium
        npm run build
        mkdir -p ../logs
        npm run dev:e2e > ../logs/customer-web.log 2>&1 &
        for i in {1..60}; do
          if curl -fsS http://127.0.0.1:3102 >/dev/null; then
            echo "customer-web is ready on 3102"
            break
          fi
          echo "waiting for customer-web on 3102..."
          sleep 2
        done
        if ! curl -fsS http://127.0.0.1:3102 >/dev/null; then
          echo "Customer web failed"
          cat ../logs/customer-web.log || true
          exit 1
        fi
        npm run test:e2e:customer

    - name: Run admin panel unit tests
      working-directory: ./frontend/admin-panel
      run: |
        npm ci
        npm test -- --testPathPattern=SocialManagement.test.tsx --watchAll=false

    - name: Run admin panel E2E tests
      working-directory: ./frontend/admin-panel
      env:
        E2E_ORCHESTRATED: 1
      run: |
        npm ci
        npm run build
        mkdir -p ../logs
        npm run dev:e2e > ../logs/admin-panel.log 2>&1 &
        for i in {1..60}; do
          if curl -fsS http://127.0.0.1:3002 >/dev/null; then
            echo "admin-panel is ready on 3002"
            break
          fi
          echo "waiting for admin-panel on 3002..."
          sleep 2
        done
        if ! curl -fsS http://127.0.0.1:3002 >/dev/null; then
          echo "Admin panel failed"
          cat ../logs/admin-panel.log || true
          exit 1
        fi
        npx playwright test --reporter=list

    - name: Upload admin panel E2E test results
      if: failure()
      uses: actions/upload-artifact@v5
      with:
        name: admin-panel-e2e-results
        path: |
          frontend/admin-panel/playwright-report/
          frontend/admin-panel/test-results/
          frontend/logs/admin-panel.log
        retention-days: 30

    - name: Run driver app E2E tests
      working-directory: ./frontend/driver-app
      run: |
        npm ci
        npm run build
        npx playwright test

    - name: Upload individual E2E test results
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: e2e-test-results
        path: |
          frontend/*/playwright-report/
          frontend/*/test-results/
        retention-days: 30

  # Build and deploy checks
  build:
    runs-on: ubuntu-latest
    needs: [api-verification, ui-e2e-lifecycle, frontend-e2e]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Build backend
      working-directory: ./backend
      run: |
        npm ci
        npm run build

    - name: Build customer web
      working-directory: ./frontend/customer-web
      run: |
        npm ci
        npm run build

    - name: Build admin panel
      working-directory: ./frontend/admin-panel
      run: |
        npm ci
        npm run build

    - name: Build driver app
      working-directory: ./frontend/driver-app
      run: |
        npm ci
        npm run build

    - name: Build restaurant web
      working-directory: ./frontend/restaurant-web
      run: |
        npm ci
        npm run build
