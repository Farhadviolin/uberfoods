name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Backend Tests & Build
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uberfoods_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend
          npm run prisma:generate

      - name: Run Linter
        run: |
          cd backend
          npm run lint

      - name: Run Type Check
        run: |
          cd backend
          npx tsc --noEmit

      - name: Run Unit Tests
        run: |
          cd backend
          npm run test:cov
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uberfoods_test
          JWT_SECRET: test-jwt-secret-key-for-ci
          NODE_ENV: test

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/coverage-final.json
          flags: backend

      - name: Build
        run: |
          cd backend
          npm run build

  # Frontend - Admin Panel
  admin-panel:
    name: Admin Panel CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/admin-panel/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend/admin-panel
          npm ci

      - name: Run Linter
        run: |
          cd frontend/admin-panel
          npm run lint

      - name: Run Type Check
        run: |
          cd frontend/admin-panel
          npm run type-check

      - name: Run Tests
        run: |
          cd frontend/admin-panel
          npm run test:coverage

      - name: Build
        run: |
          cd frontend/admin-panel
          npm run build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: admin-panel-dist
          path: frontend/admin-panel/dist

  # Frontend - Customer Web
  customer-web:
    name: Customer Web CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/customer-web/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend/customer-web
          npm ci

      - name: Run Tests
        run: |
          cd frontend/customer-web
          npm run test:coverage

      - name: Build
        run: |
          cd frontend/customer-web
          npm run build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/customer-web/coverage/coverage-final.json
          flags: customer-web

  # Frontend - Driver App
  driver-app:
    name: Driver App CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/driver-app/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend/driver-app
          npm ci

      - name: Run Tests
        run: |
          cd frontend/driver-app
          npm run test:coverage

      - name: Build
        run: |
          cd frontend/driver-app
          npm run build

  # Frontend - Restaurant Web
  restaurant-web:
    name: Restaurant Web CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/restaurant-web/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend/restaurant-web
          npm ci

      - name: Run Tests
        run: |
          cd frontend/restaurant-web
          npm run test:coverage

      - name: Build
        run: |
          cd frontend/restaurant-web
          npm run build

  # E2E Tests
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, admin-panel, customer-web]

    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Playwright
        run: |
          cd frontend/customer-web
          npm ci
          npx playwright install --with-deps

      - name: Run E2E Tests
        run: |
          cd frontend/customer-web
          npm run test:e2e

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: frontend/customer-web/playwright-report

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run npm audit (Backend)
        run: |
          cd backend
          npm audit --audit-level=moderate || true

      - name: Run npm audit (Frontend)
        run: |
          cd frontend/customer-web
          npm audit --audit-level=moderate || true

  # Deploy to Staging (on develop branch)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend, admin-panel, customer-web, driver-app, restaurant-web, e2e-tests]
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging..."
          # Add your deployment script here

  # Deploy to Production (on main branch)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend, admin-panel, customer-web, driver-app, restaurant-web, e2e-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          # Add your deployment script here
