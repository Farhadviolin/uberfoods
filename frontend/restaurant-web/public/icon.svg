<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#4338CA" rx="80"/>
  
  <!-- Restaurant/Food Icon -->
  <g transform="translate(128, 128)">
    <!-- Plate -->
    <ellipse cx="128" cy="180" rx="100" ry="20" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Fork -->
    <path d="M 80 100 L 80 200 L 90 200 L 90 120 L 95 120 L 95 200 L 100 200 L 100 100 Z" fill="#FFFFFF"/>
    <path d="M 80 100 L 75 95 L 75 85 L 85 85 L 85 95 Z" fill="#FFFFFF"/>
    
    <!-- Knife -->
    <path d="M 176 100 L 176 200 L 186 200 L 186 120 L 191 120 L 191 200 L 196 200 L 196 100 Z" fill="#FFFFFF"/>
    <path d="M 196 100 L 201 95 L 201 85 L 191 85 L 191 95 Z" fill="#FFFFFF"/>
    
    <!-- Food (Pizza slice) -->
    <path d="M 128 80 L 200 140 L 180 200 L 80 200 L 60 140 Z" fill="#F59E0B"/>
    <path d="M 128 80 L 130 120 L 140 130 L 150 120 L 160 130 L 170 120 L 180 140 L 200 140" stroke="#FFFFFF" stroke-width="3" fill="none"/>
    <circle cx="140" cy="150" r="8" fill="#FFFFFF"/>
    <circle cx="160" cy="160" r="6" fill="#FFFFFF"/>
    <circle cx="150" cy="170" r="5" fill="#FFFFFF"/>
  </g>
  
  <!-- Text "R" for Restaurant -->
  <text x="256" y="380" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="#FFFFFF" text-anchor="middle">R</text>
</svg>
