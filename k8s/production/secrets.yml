apiVersion: v1
kind: Secret
metadata:
  name: uberfoods-secrets
  namespace: uberfoods-prod
type: Opaque
data:
  # Database
  postgres-user: dWJlcmdvb2RzX3VzZXI=  # base64 encoded: uberfoods_user
  postgres-password: <BASE64_ENCODED_POSTGRES_PASSWORD>
  database-url: <BASE64_ENCODED_DATABASE_URL>

  # Redis
  redis-password: <BASE64_ENCODED_REDIS_PASSWORD>
  redis-url: <BASE64_ENCODED_REDIS_URL>

  # JWT
  jwt-secret: <BASE64_ENCODED_JWT_SECRET>
  jwt-refresh-secret: <BASE64_ENCODED_JWT_REFRESH_SECRET>

  # Payment
  stripe-secret-key: <BASE64_ENCODED_STRIPE_SECRET_KEY>

  # Email
  sendgrid-api-key: <BASE64_ENCODED_SENDGRID_API_KEY>

  # Monitoring
  grafana-admin-password: <BASE64_ENCODED_GRAFANA_ADMIN_PASSWORD>

---
# AWS Secrets (if using AWS)
apiVersion: v1
kind: Secret
metadata:
  name: uberfoods-aws-secrets
  namespace: uberfoods-prod
type: Opaque
data:
  aws-access-key-id: <BASE64_ENCODED_AWS_ACCESS_KEY_ID>
  aws-secret-access-key: <BASE64_ENCODED_AWS_SECRET_ACCESS_KEY>
  s3-bucket: <BASE64_ENCODED_S3_BUCKET_NAME>

---
# SSL Certificate (managed by cert-manager)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@uberfoods.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
