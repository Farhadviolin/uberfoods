version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: uberfoods_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: uberfoods_prod
      POSTGRES_USER: uberfoods_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - uberfoods_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uberfoods_user -d uberfoods_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: uberfoods_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - uberfoods_prod
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    image: uberfoods/backend:prod-${BUILD_NUMBER:-latest}
    container_name: uberfoods_backend_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://uberfoods_user:${POSTGRES_PASSWORD}@postgres:5432/uberfoods_prod
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uberfoods_prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Customer Web App
  customer-web:
    image: uberfoods/customer-web:prod-${BUILD_NUMBER:-latest}
    container_name: uberfoods_customer_web_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: https://api.uberfoods.com
      VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      VITE_FIREBASE_API_KEY: ${FIREBASE_API_KEY}
      VITE_SENTRY_DSN: ${SENTRY_DSN}
    networks:
      - uberfoods_prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Driver App
  driver-app:
    image: uberfoods/driver-app:prod-${BUILD_NUMBER:-latest}
    container_name: uberfoods_driver_app_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: https://api.uberfoods.com
      VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      VITE_FIREBASE_API_KEY: ${FIREBASE_API_KEY}
      VITE_SENTRY_DSN: ${SENTRY_DSN}
    networks:
      - uberfoods_prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Restaurant Web App
  restaurant-web:
    image: uberfoods/restaurant-web:prod-${BUILD_NUMBER:-latest}
    container_name: uberfoods_restaurant_web_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: https://api.uberfoods.com
      VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      VITE_SENTRY_DSN: ${SENTRY_DSN}
    networks:
      - uberfoods_prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin Panel
  admin-panel:
    image: uberfoods/admin-panel:prod-${BUILD_NUMBER:-latest}
    container_name: uberfoods_admin_panel_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: https://api.uberfoods.com
      VITE_SENTRY_DSN: ${SENTRY_DSN}
    networks:
      - uberfoods_prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: uberfoods_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - customer-web
      - driver-app
      - restaurant-web
      - admin-panel
    networks:
      - uberfoods_prod

  # Redis Commander (Development only)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: uberfoods_redis_commander_prod
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:${REDIS_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - uberfoods_prod
    profiles:
      - dev

  # pgAdmin (Development only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: uberfoods_pgadmin_prod
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@uberfoods.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - uberfoods_prod
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  nginx_logs:
    driver: local
  pgadmin_data:
    driver: local

networks:
  uberfoods_prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
