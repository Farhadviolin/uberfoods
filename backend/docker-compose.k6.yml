version: '3.8'

services:
  k6:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts
      - ./k6/reports:/reports
    environment:
      - K6_PROMETHEUS_RW_SERVER_URL=${K6_PROMETHEUS_RW_SERVER_URL}
      - K6_PROMETHEUS_RW_TREND_STATS=${K6_PROMETHEUS_RW_TREND_STATS}
    networks:
      - uberfoods_network
    depends_on:
      - api
    command: ["run", "/scripts/run-all-tests.js"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=test
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - uberfoods_network
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=uberfoods_test
      - POSTGRES_USER=uberfoods
      - POSTGRES_PASSWORD=test_password
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - uberfoods_network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - uberfoods_network

volumes:
  postgres_test_data:

networks:
  uberfoods_network:
    driver: bridge