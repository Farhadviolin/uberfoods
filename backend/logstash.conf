input {
  tcp {
    port => 5044
    codec => json_lines
  }

  http {
    port => 8080
    codec => json
  }
}

filter {
  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd'T'HH:mm:ss.SSS'Z'"]
    target => "@timestamp"
  }

  # Add geo information for IP addresses
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Parse user agent
  if [user_agent] {
    useragent {
      source => "user_agent"
      target => "user_agent_parsed"
    }
  }

  # Categorize log levels
  if [level] == "error" or [level] == "ERROR" {
    mutate { add_tag => ["error"] }
  } else if [level] == "warn" or [level] == "WARN" {
    mutate { add_tag => ["warning"] }
  } else if [level] == "info" or [level] == "INFO" {
    mutate { add_tag => ["info"] }
  } else if [level] == "debug" or [level] == "DEBUG" {
    mutate { add_tag => ["debug"] }
  }

  # Extract service information
  if [message] =~ /hmor-backend/ {
    mutate { add_field => { "service" => "backend" } }
  } else if [message] =~ /hmor-customer-web/ {
    mutate { add_field => { "service" => "customer-web" } }
  } else if [message] =~ /hmor-driver-app/ {
    mutate { add_field => { "service" => "driver-app" } }
  } else if [message] =~ /hmor-admin-panel/ {
    mutate { add_field => { "service" => "admin-panel" } }
  } else if [message] =~ /hmor-restaurant-web/ {
    mutate { add_field => { "service" => "restaurant-web" } }
  }

  # Parse API request logs
  if [message] =~ /\[.*\].*\/api\// {
    grok {
      match => { "message" => "\[%{WORD:method}\] %{URIPATHPARAM:endpoint} %{DATA:details}" }
    }
  }

  # Parse error messages
  if [message] =~ /Error|Exception/ {
    grok {
      match => { "message" => "%{DATA:error_type}: %{DATA:error_message}" }
    }
  }

  # Anonymize sensitive data
  mutate {
    gsub => [
      "message", "%{EMAIL}", "[EMAIL REDACTED]",
      "message", "%{CREDITCARD}", "[CREDITCARD REDACTED]",
      "message", "%{IP}", "[IP REDACTED]",
      "url", "%{URI}", "[URL REDACTED]"
    ]
  }

  # Add environment information
  mutate {
    add_field => {
      "environment" => "production"
      "application" => "hmor-food-delivery"
    }
  }
}

output {
  # Send all logs to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "hmor-logs-%{+YYYY.MM.dd}"
    document_type => "log"
  }

  # Also send error logs to separate index for easier querying
  if "error" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "hmor-errors-%{+YYYY.MM.dd}"
      document_type => "error"
    }
  }

  # Debug output (remove in production)
  stdout {
    codec => rubydebug
  }
}
