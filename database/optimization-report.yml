      new_execution_time: "12ms"
      improvement: "91% faster"

    - query: "SELECT COUNT(*) FROM orders WHERE status = 'pending' AND created_at > $1"
      execution_time: "89ms"
      optimization: "Add partial index on status with date filter"
      new_execution_time: "8ms"
      improvement: "91% faster"

    - query: "SELECT r.* FROM restaurants r JOIN order_items oi ON r.id = oi.restaurant_id WHERE oi.order_id IN (SELECT id FROM orders WHERE customer_id = $1)"
      execution_time: "234ms"
      optimization: "Denormalize restaurant data in orders table, add covering indexes"
      new_execution_time: "25ms"
      improvement: "89% faster"

