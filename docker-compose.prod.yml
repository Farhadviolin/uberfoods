version: '3.8'

# 🚀 UberFoods - Production Docker Compose
# Production-ready Container Setup

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: uberfoods-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uberfoods_production}
      POSTGRES_USER: ${POSTGRES_USER:-uberfoods_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/backup
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - uberfoods_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uberfoods_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: uberfoods-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - uberfoods_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: uberfoods-api-prod
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/dist:/app/dist
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - uberfoods_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend App
  web:
    build:
      context: ./frontend/customer-web
      dockerfile: Dockerfile.prod
    container_name: uberfoods-web-prod
    environment:
      - VITE_API_URL=${VITE_API_URL:-https://api.yourdomain.com/api}
      - NODE_ENV=production
    depends_on:
      - api
    volumes:
      - ./frontend/customer-web/dist:/usr/share/nginx/html
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    networks:
      - uberfoods_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: uberfoods-nginx-prod
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./frontend/customer-web/dist:/var/www/html
      - ./nginx/logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - web
    networks:
      - uberfoods_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  uberfoods_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
