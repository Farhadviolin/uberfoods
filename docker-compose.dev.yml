services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: uberfoods_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: uberfoods
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uberfoods"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uberfoods_dev_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: uberfoods_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - uberfoods_dev_network

volumes:
  postgres_data:
  redis_data:

networks:
  uberfoods_dev_network:
    driver: bridge