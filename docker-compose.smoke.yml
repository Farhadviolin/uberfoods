name: uberfoods

services:
  postgres:
    image: postgres:15-alpine
    container_name: uberfoods_postgres
    environment:
      POSTGRES_DB: uberfoods
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uberfoods"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - uberfoods_network

  redis:
    image: redis:7-alpine
    container_name: uberfoods_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - uberfoods_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: uberfoods-backend:smoke
    container_name: uberfoods_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/uberfoods
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-for-dev
      NODE_ENV: development
      PORT: "3000"

      # Für Seed (sonst Fehler "Required seed passwords not set")
      SEED_ALLOW_DEFAULTS: "true"
      SEED_CUSTOMER_PASSWORD: "customer123"
      SEED_RESTAURANT_PASSWORD: "restaurant123"
      SEED_DRIVER_PASSWORD: "driver123"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1));"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - uberfoods_network
    volumes:
      - /app/node_modules

networks:
  uberfoods_network:
    name: uberfoods_uberfoods_network
    driver: bridge

volumes:
  postgres_data:
    name: uberfoods_postgres_data
  redis_data:
    name: uberfoods_redis_data
