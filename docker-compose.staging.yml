version: '3.8'

services:
  # ===== DATABASE =====
  postgres:
    image: postgres:15-alpine
    container_name: uberfoods-staging-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-uberfoods_staging}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - uberfoods-staging

  # ===== REDIS =====
  redis:
    image: redis:7-alpine
    container_name: uberfoods-staging-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - staging_redis_data:/data
    restart: unless-stopped
    networks:
      - uberfoods-staging

  # ===== BACKEND =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uberfoods-staging-backend
    environment:
      - NODE_ENV=staging
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-uberfoods_staging}?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-staging_jwt_secret_min_32_chars_long}
      - JWT_EXPIRES_IN=24h
      - ALLOWED_ORIGINS=http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004
      - LOG_LEVEL=debug
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - uberfoods-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  staging_postgres_data:
  staging_redis_data:

networks:
  uberfoods-staging:
    driver: bridge
